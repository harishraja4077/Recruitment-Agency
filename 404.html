<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The page you are looking for does not exist. Back to Stackly Recruitment Agency home.">
    <title>Page Not Found (404) - Stackly Recruiting Agency</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="error-wrapper">
        <div class="error-content">
            <div class="error-code">404</div>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-desc">We're sorry, but the page you are looking for does not exist, has been removed, or is temporarily unavailable. Use the buttons below or search for jobs to get back on track.</p>
            
            <!-- Quick Search Widget -->
            <form action="Project.html" class="search-widget" style="max-width: 500px; margin: 0 auto 3rem auto; box-shadow: var(--shadow-md);">
                <div class="search-input-group" style="border-right: none;">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search jobs, skills..." name="search" required>
                </div>
                <button type="submit" class="btn btn-primary" style="border-radius: var(--radius-sm); margin-right: 0.25rem;">Search</button>
            </form>

            <div class="flex" style="justify-content: center; gap: 1rem;">
                <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
                <a href="Project.html" class="btn btn-secondary">Find Openings</a>
            </div>
        </div>
    </div>

    <!-- Script file -->
    <script src="js/script.js"></script>
</body>
</html>
